# nginx.conf

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location = /tenko-roi {
        return 301 /tenko-roi/;
    }

    location /tenko-roi/ {
        rewrite ^/tenko-roi(/.*)$ $1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Additional configurations go here...
}
